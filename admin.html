<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamwing · Control</title>


  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #07070a;
      --deep: #0c0c10;
      --card: #111116;
      --card2: #15151b;
      --card3: #1a1a22;
      --line: rgba(255, 255, 255, 0.06);
      --line2: rgba(255, 255, 255, 0.10);
      --line3: rgba(255, 255, 255, 0.16);
      --cyan: #00d4a0;
      --cyan-dim: rgba(0, 212, 160, 0.10);
      --cyan-mid: rgba(0, 212, 160, 0.20);
      --red: #ff3b5c;
      --green: #00e676;
      --yellow: #ffb020;
      --blue: #5b9cf6;
      --purple: #a78bfa;
      --text: #eeeef3;
      --muted: rgba(238, 238, 243, 0.55);
      --muted2: rgba(238, 238, 243, 0.32);
      --display: 'Sora', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      --mono: 'IBM Plex Mono', 'Cascadia Code', 'Consolas', 'SF Mono', 'Menlo', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 5px;
    }

    [data-theme="light"] {
      --black: #f4f4f8;
      --deep: #ebebf2;
      --card: #ffffff;
      --card2: #f8f8fc;
      --card3: #f2f2f8;
      --line: rgba(0, 0, 0, 0.06);
      --line2: rgba(0, 0, 0, 0.10);
      --line3: rgba(0, 0, 0, 0.16);
      --cyan: #009e78;
      --red: #d9003a;
      --green: #009943;
      --yellow: #b86f00;
      --blue: #1d4ed8;
      --purple: #6d28d9;
      --text: #0a0a10;
      --muted: rgba(10, 10, 16, 0.58);
      --muted2: rgba(10, 10, 16, 0.35);
    }

    [data-theme="light"] .login-left {
      background: linear-gradient(145deg, #e6f5f0 0%, #f0f0f8 100%);
    }

    [data-theme="light"] .field input {
      background: #f2f2f8;
    }

    [data-theme="light"] .field input:focus {
      background: #fff;
    }

    [data-theme="light"] thead tr {
      background: rgba(0, 0, 0, 0.025);
    }

    [data-theme="light"] .tbl-wrap {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
    }

    [data-theme="light"] .topbar {
      background: rgba(244, 244, 248, .94);
    }

    [data-theme="light"] .sc {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--mono);
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .3s, color .3s;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ═══════ ANIMATIONS ═══════ */
    @keyframes gridScroll {
      to {
        background-position: 60px 60px;
      }
    }

    @keyframes riseUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes floatOrb {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(-50%, -54%) scale(1.1);
      }
    }

    @keyframes scanLine {
      0% {
        top: -1px;
        opacity: 0;
      }

      8% {
        opacity: .6;
      }

      92% {
        opacity: .6;
      }

      100% {
        top: 100%;
        opacity: 0;
      }
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(0, 212, 160, .5);
      }

      50% {
        opacity: .6;
        box-shadow: 0 0 0 5px rgba(0, 212, 160, 0);
      }
    }

    @keyframes spinning {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* ═══════ LOGIN ═══════ */
    #login-page {
      display: flex;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .login-spacer {
      flex: 1;
    }

    .login-left {
      flex: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 80px;
      position: relative;
      border-right: 1px solid var(--line);
      min-width: 0;
      background: linear-gradient(145deg, rgba(0, 212, 160, 0.025) 0%, transparent 55%);
    }

    .login-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(0, 212, 160, .028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 160, .028) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridScroll 30s linear infinite;
    }

    .login-left::after {
      content: '';
      position: absolute;
      top: 42%;
      left: 38%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0, 212, 160, .055) 0%, transparent 65%);
      animation: floatOrb 12s ease-in-out infinite;
      pointer-events: none;
    }

    .brand-area {
      position: relative;
      z-index: 1;
      animation: riseUp .9s cubic-bezier(.16, 1, .3, 1) .1s both;
    }

    .brand-logo-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 44px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00d4a0 0%, #00a87c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 40px rgba(0, 212, 160, .25), 0 0 0 1px rgba(0, 212, 160, .18);
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 26px;
      height: 26px;
    }

    .brand-badge {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .32em;
      color: var(--cyan);
      background: var(--cyan-dim);
      border: 1px solid rgba(0, 212, 160, .2);
      padding: 5px 13px;
      border-radius: 20px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .brand-name {
      font-family: var(--display);
      font-size: 62px;
      font-weight: 700;
      letter-spacing: -.03em;
      line-height: .92;
      margin-bottom: 22px;
      color: var(--text);
    }

    .brand-name em {
      color: var(--cyan);
      font-style: normal;
    }

    .brand-tagline {
      font-family: var(--display);
      font-size: 17px;
      color: var(--muted);
      line-height: 1.75;
      max-width: 380px;
      margin-bottom: 56px;
      font-weight: 300;
    }

    .brand-features {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bf-item {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: var(--display);
      font-size: 15px;
      color: var(--muted);
      font-weight: 400;
      padding: 13px 18px;
      background: rgba(255, 255, 255, .022);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      transition: border-color .2s, background .2s, color .2s;
    }

    .bf-item:hover {
      background: rgba(0, 212, 160, .04);
      border-color: rgba(0, 212, 160, .14);
      color: var(--text);
    }

    .bf-icon {
      width: 30px;
      height: 30px;
      background: var(--cyan-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .bf-icon svg {
      width: 14px;
      height: 14px;
      color: var(--cyan);
    }

    .login-right {
      flex: 1.1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 64px;
      position: relative;
      background: var(--card);
      min-width: 0;
      border-left: 1px solid var(--line);
    }

    .login-right::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scanLine 8s ease-in-out infinite;
      opacity: 0;
      pointer-events: none;
    }

    .login-form-wrap {
      animation: riseUp .9s cubic-bezier(.16, 1, .3, 1) .25s both;
      width: 100%;
      max-width: 320px;
    }

    .login-eyebrow {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .32em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .login-eyebrow::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--cyan);
      flex-shrink: 0;
    }

    .login-title {
      font-family: var(--display);
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .login-sub {
      font-family: var(--display);
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 44px;
      line-height: 1.65;
      font-weight: 300;
    }

    .field {
      margin-bottom: 20px;
      position: relative;
    }

    .field label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .22em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .field-icon {
      width: 12px;
      height: 12px;
      opacity: .45;
      flex-shrink: 0;
    }

    .field input {
      width: 100%;
      background: var(--deep);
      border: 1px solid var(--line2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 400;
      padding: 14px 18px;
      outline: none;
      border-radius: var(--radius-sm);
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    .field input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 212, 160, .08), 0 0 24px rgba(0, 212, 160, .04);
      background: var(--black);
    }

    .field input::placeholder {
      color: var(--muted2);
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #00d4a0 0%, #00b887 100%);
      color: #000;
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .1em;
      padding: 15px;
      border-radius: var(--radius-sm);
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s;
      margin-top: 8px;
      text-transform: uppercase;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0, 212, 160, .35);
    }

    .login-btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .login-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .18), transparent);
      transform: translateX(-100%);
      transition: transform .6s;
    }

    .login-btn:hover::after {
      transform: translateX(100%);
    }

    .login-err {
      color: var(--red);
      font-family: var(--mono);
      font-size: 14px;
      margin-top: 14px;
      min-height: 16px;
      letter-spacing: .05em;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .login-err:not(:empty)::before {
      content: '⚠';
      font-size: 13px;
    }

    /* ═══════ MAIN ═══════ */
    #main-page {
      display: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 60px;
      background: rgba(7, 7, 10, .93);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 44px;
      justify-content: space-between;
      transform: translateZ(0);
    }

    .t-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .t-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00d4a0 0%, #00a87c 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0, 212, 160, .22);
    }

    .t-logo svg {
      width: 16px;
      height: 16px;
    }

    .t-brand {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .t-brand sub {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--muted);
      margin-left: 8px;
      vertical-align: middle;
      text-transform: uppercase;
      font-weight: 400;
    }

    .t-divider {
      width: 1px;
      height: 20px;
      background: var(--line2);
    }

    .t-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .14em;
      color: var(--cyan);
      text-transform: uppercase;
      padding: 5px 12px;
      background: var(--cyan-dim);
      border: 1px solid rgba(0, 212, 160, .18);
      border-radius: 20px;
      font-weight: 500;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      animation: livePulse 2s ease-in-out infinite;
    }

    .btn-out {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: 1px solid var(--line2);
      padding: 7px 16px;
      border-radius: var(--radius-xs);
      transition: all .2s;
      font-weight: 400;
    }

    .btn-out:hover {
      color: var(--text);
      background: var(--card2);
      border-color: var(--line3);
    }

    .btn-theme {
      width: 34px;
      height: 34px;
      background: var(--card2);
      border: 1px solid var(--line2);
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }

    .btn-theme:hover {
      border-color: var(--cyan);
      transform: rotate(22deg);
    }

    /* ── auto-refresh indicator ── */
    .refresh-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .1em;
      color: var(--muted2);
      text-transform: uppercase;
    }

    .refresh-ring {
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--line2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spinning 3s linear infinite;
    }

    /* ═══════ BODY ═══════ */
    .body {
      max-width: 1520px;
      margin: 0 auto;
      padding: 44px 44px 72px;
    }

    /* ── SECTION TITLE ── */
    .tb-title {
      font-family: var(--display);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -.01em;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tb-title-dot {
      width: 7px;
      height: 7px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 212, 160, .9), 0 0 20px rgba(0, 212, 160, .4);
      flex-shrink: 0;
    }

    /* ── STATS GRID ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 44px;
    }

    .sc {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 26px 26px 22px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: riseUp .6s cubic-bezier(.16, 1, .3, 1) both;
      cursor: default;
      transition: border-color .25s, box-shadow .25s, transform .25s;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .18);
    }

    .sc:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .3);
    }

    .sc:nth-child(1) {
      animation-delay: .04s
    }

    .sc:nth-child(2) {
      animation-delay: .08s
    }

    .sc:nth-child(3) {
      animation-delay: .12s
    }

    .sc:nth-child(4) {
      animation-delay: .16s
    }

    .sc-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
    }

    .sc-all .sc-accent {
      background: linear-gradient(90deg, var(--cyan), rgba(0, 212, 160, .1));
    }

    .sc-remote .sc-accent {
      background: linear-gradient(90deg, var(--yellow), rgba(255, 176, 32, .1));
    }

    .sc-ok .sc-accent {
      background: linear-gradient(90deg, var(--green), rgba(0, 230, 118, .1));
    }

    .sc-ban .sc-accent {
      background: linear-gradient(90deg, var(--red), rgba(255, 59, 92, .1));
    }

    .sc-glow {
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      filter: blur(40px);
      opacity: .05;
      pointer-events: none;
    }

    .sc-all .sc-glow {
      background: var(--cyan);
    }

    .sc-remote .sc-glow {
      background: var(--yellow);
    }

    .sc-ok .sc-glow {
      background: var(--green);
    }

    .sc-ban .sc-glow {
      background: var(--red);
    }

    .sc-all:hover {
      border-color: rgba(0, 212, 160, .18);
    }

    .sc-remote:hover {
      border-color: rgba(255, 176, 32, .18);
    }

    .sc-ok:hover {
      border-color: rgba(0, 230, 118, .18);
    }

    .sc-ban:hover {
      border-color: rgba(255, 59, 92, .18);
    }

    .sc-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .sc-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sc-all .sc-icon {
      background: rgba(0, 212, 160, .10);
      color: var(--cyan);
    }

    .sc-remote .sc-icon {
      background: rgba(255, 176, 32, .10);
      color: var(--yellow);
    }

    .sc-ok .sc-icon {
      background: rgba(0, 230, 118, .10);
      color: var(--green);
    }

    .sc-ban .sc-icon {
      background: rgba(255, 59, 92, .10);
      color: var(--red);
    }

    .sc-icon svg {
      width: 17px;
      height: 17px;
    }

    .sc-label {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      line-height: 1;
    }

    .sc-num {
      font-family: var(--display);
      font-size: 62px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -.03em;
      flex: 1;
      display: flex;
      align-items: flex-end;
      padding-bottom: 2px;
    }

    .sc-all .sc-num {
      color: var(--cyan);
    }

    .sc-remote .sc-num {
      color: var(--yellow);
    }

    .sc-ok .sc-num {
      color: var(--green);
    }

    .sc-ban .sc-num {
      color: var(--red);
    }

    .sc-divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0 12px;
    }

    .sc-sub {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted2);
      letter-spacing: .08em;
      font-weight: 400;
    }

    /* ── TOOLBAR ── */
    .toolbar-outer {
      margin-bottom: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filter-tabs {
      display: flex;
      gap: 3px;
      background: var(--deep);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .ftab {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      font-weight: 400;
    }

    .ftab:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .04);
    }

    .ftab.active {
      background: var(--cyan);
      color: #000;
      font-weight: 600;
      box-shadow: 0 2px 10px rgba(0, 212, 160, .28);
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      padding: 10px 14px 10px 38px;
      outline: none;
      border-radius: var(--radius-sm);
      width: 240px;
      transition: border-color .2s, box-shadow .2s;
      letter-spacing: .04em;
      font-weight: 400;
    }

    .search-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 212, 160, .07);
    }

    .search-input::placeholder {
      color: var(--muted2);
    }

    /* ── TABLE ── */
    .tbl-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      animation: riseUp .6s cubic-bezier(.16, 1, .3, 1) .18s both;
      box-shadow: 0 4px 28px rgba(0, 0, 0, .22);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      border-bottom: 1px solid var(--line);
    }

    thead tr {
      background: rgba(0, 0, 0, .22);
    }

    [data-theme="light"] thead tr {
      background: rgba(0, 0, 0, .025);
    }

    th {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .14em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: left;
      padding: 14px 20px;
      font-weight: 500;
      white-space: nowrap;
    }

    td {
      padding: 15px 20px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr {
      transition: background .12s;
    }

    tbody tr:hover td {
      background: rgba(255, 255, 255, .018);
    }

    [data-theme="light"] tbody tr:hover td {
      background: rgba(0, 0, 0, .018);
    }

    .dev-id {
      font-family: var(--mono);
      font-size: 15px;
      letter-spacing: .02em;
      font-weight: 400;
      color: var(--text);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }

    .dev-ip {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .time {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: var(--radius-xs);
      font-weight: 500;
    }

    .bdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .b-ok {
      background: rgba(0, 230, 118, .07);
      color: var(--green);
      border: 1px solid rgba(0, 230, 118, .14);
    }

    .b-ok .bdot {
      background: var(--green);
      animation: livePulse 2.5s infinite;
    }

    .b-ban {
      background: rgba(255, 59, 92, .07);
      color: var(--red);
      border: 1px solid rgba(255, 59, 92, .14);
    }

    .b-ban .bdot {
      background: var(--red);
    }

    .b-remote {
      background: rgba(255, 176, 32, .09);
      color: var(--yellow);
      border: 1px solid rgba(255, 176, 32, .18);
    }

    .b-remote .bdot {
      background: var(--yellow);
      animation: livePulse 1.2s infinite;
    }

    .b-idle {
      background: rgba(255, 255, 255, .03);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .b-idle .bdot {
      background: var(--muted);
    }

    .version-tag {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .06em;
      padding: 3px 9px;
      border-radius: var(--radius-xs);
      display: inline-block;
      font-weight: 500;
    }

    .v-ok {
      background: rgba(0, 212, 160, .07);
      color: var(--cyan);
      border: 1px solid rgba(0, 212, 160, .16);
    }

    .v-outdated {
      background: rgba(255, 176, 32, .07);
      color: var(--yellow);
      border: 1px solid rgba(255, 176, 32, .18);
    }

    .v-unknown {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }

    /* ── ACTIONS ── */
    .acts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .abtn {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
      font-weight: 400;
    }

    .a-ban {
      background: rgba(255, 59, 92, .07);
      color: var(--red);
      border-color: rgba(255, 59, 92, .16);
    }

    .a-ban:hover {
      background: rgba(255, 59, 92, .16);
    }

    .a-unban {
      background: rgba(0, 230, 118, .07);
      color: var(--green);
      border-color: rgba(0, 230, 118, .16);
    }

    .a-unban:hover {
      background: rgba(0, 230, 118, .16);
    }

    .a-del {
      background: transparent;
      color: var(--muted);
      border-color: var(--line2);
    }

    .a-del:hover {
      color: var(--text);
      border-color: var(--line3);
      background: rgba(255, 255, 255, .03);
    }

    .a-hist {
      background: rgba(91, 156, 246, .07);
      color: var(--blue);
      border-color: rgba(91, 156, 246, .16);
    }

    .a-hist:hover {
      background: rgba(91, 156, 246, .16);
    }

    /* ── PLACEHOLDER ── */
    .placeholder {
      text-align: center;
      padding: 80px 24px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: .12em;
    }

    .spin {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--line2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spinning .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .hint {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted2);
      letter-spacing: .08em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 0 2px;
    }

    .hint::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border: 1.5px solid rgba(0, 212, 160, .3);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spinning 3s linear infinite;
    }

    /* ═══════ MODAL ═══════ */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .78);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      animation: fadeIn .2s ease;
    }

    .modal {
      transform: translateZ(0);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--line2);
      border-radius: 14px;
      width: 640px;
      max-width: 96vw;
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      animation: riseUp .28s cubic-bezier(.16, 1, .3, 1) both;
      box-shadow: 0 48px 120px rgba(0, 0, 0, .75), 0 0 0 1px rgba(255, 255, 255, .04);
    }

    .modal-head {
      padding: 22px 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-head-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .modal-head-icon {
      width: 36px;
      height: 36px;
      background: rgba(0, 212, 160, .09);
      border: 1px solid rgba(0, 212, 160, .18);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      flex-shrink: 0;
    }

    .modal-head-icon svg {
      width: 15px;
      height: 15px;
    }

    .modal-head h3 {
      font-family: var(--display);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .modal-head-sub {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: .06em;
    }

    .modal-close {
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--line);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .09);
      border-color: var(--line2);
    }

    .modal-body {
      padding: 20px 28px;
      overflow-y: auto;
    }

    .session-item {
      background: var(--deep);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: border-color .15s;
    }

    .session-item:last-child {
      margin-bottom: 0;
    }

    .session-item:hover {
      border-color: var(--line2);
    }

    .si-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .si-id {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
    }

    .si-detail {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
      line-height: 1;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 20px;
    }

    .si-detail span {
      color: var(--text);
    }

    .modal-empty {
      text-align: center;
      padding: 48px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .1em;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card2);
      border: 1px solid var(--line2);
      padding: 14px 20px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 15px;
      opacity: 0;
      transform: translateY(12px) scale(.97);
      transition: all .3s cubic-bezier(.16, 1, .3, 1);
      pointer-events: none;
      z-index: 300;
      font-weight: 400;
      box-shadow: 0 24px 72px rgba(0, 0, 0, .65), 0 0 0 1px rgba(255, 255, 255, .04);
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .tbar {
      width: 3px;
      height: 28px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #toast.success .tbar {
      background: var(--green);
    }

    #toast.danger .tbar {
      background: var(--red);
    }

    #toast.info .tbar {
      background: var(--cyan);
    }

    #toast.success {
      border-color: rgba(0, 230, 118, .16);
    }

    #toast.danger {
      border-color: rgba(255, 59, 92, .16);
    }

    #toast.info {
      border-color: rgba(0, 212, 160, .16);
    }

    /* ── CHECKBOX ── */
    .cb-cell,
    .th-cb {
      width: 0;
      min-width: 0;
      padding: 0 !important;
      overflow: hidden;
      transition: width .22s cubic-bezier(.16, 1, .3, 1), padding .22s cubic-bezier(.16, 1, .3, 1), opacity .2s;
      opacity: 0;
    }

    .tbl-wrap:hover .cb-cell,
    .tbl-wrap:hover .th-cb,
    .tbl-wrap.has-selection .cb-cell,
    .tbl-wrap.has-selection .th-cb {
      width: 44px;
      padding: 16px 0 16px 20px !important;
      opacity: 1;
    }

    .th-cb {
      padding: 14px 0 14px 20px !important;
    }

    .tbl-wrap:hover .th-cb,
    .tbl-wrap.has-selection .th-cb {
      padding: 14px 0 14px 20px !important;
    }

    .row-cb {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 1.5px solid var(--line2);
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .15s, background .15s, opacity .2s;
      display: block;
      opacity: 0;
    }

    .tbl-wrap:hover .row-cb,
    .tbl-wrap.has-selection .row-cb {
      opacity: 1;
    }

    .row-cb:hover {
      border-color: var(--cyan);
    }

    .row-cb:checked {
      background: var(--cyan);
      border-color: var(--cyan);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='%23000' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 10px 8px;
    }

    .row-cb:indeterminate {
      border-color: var(--cyan);
      background: var(--cyan);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1h8' stroke='%23000' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 10px 2px;
    }

    tbody tr.selected td {
      background: rgba(0, 212, 160, .035) !important;
    }

    tbody tr.selected {
      outline: 1px solid rgba(0, 212, 160, .10);
      outline-offset: -1px;
    }

    /* ── BATCH BAR ── */
    .batch-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(0, 212, 160, .07);
      border: 0px solid rgba(0, 212, 160, .18);
      border-radius: var(--radius-sm);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      padding: 0;
      margin-bottom: 0;
      transition: max-height .3s cubic-bezier(.16, 1, .3, 1), opacity .22s ease,
        padding .3s cubic-bezier(.16, 1, .3, 1), margin-bottom .3s cubic-bezier(.16, 1, .3, 1), border-width .3s;
    }

    .batch-bar.visible {
      max-height: 56px;
      opacity: 1;
      pointer-events: auto;
      padding: 10px 16px;
      margin-bottom: 12px;
      border-width: 1px;
    }

    .batch-count {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--cyan);
      letter-spacing: .08em;
      margin-right: 4px;
      white-space: nowrap;
    }

    .batch-sep {
      width: 1px;
      height: 18px;
      background: rgba(0, 212, 160, .2);
      flex-shrink: 0;
    }

    .batch-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .bbtn {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 6px 13px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
      font-weight: 400;
    }

    .bb-ban {
      background: rgba(255, 59, 92, .08);
      color: var(--red);
      border-color: rgba(255, 59, 92, .2);
    }

    .bb-ban:hover {
      background: rgba(255, 59, 92, .2);
    }

    .bb-unban {
      background: rgba(0, 230, 118, .08);
      color: var(--green);
      border-color: rgba(0, 230, 118, .2);
    }

    .bb-unban:hover {
      background: rgba(0, 230, 118, .2);
    }

    .bb-del {
      background: transparent;
      color: var(--muted);
      border-color: var(--line2);
    }

    .bb-del:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .05);
      border-color: var(--line2);
    }

    .batch-clear {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    .batch-clear:hover {
      color: var(--text);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, .18);
    }

    /* ── LIGHT THEME overrides ── */
    [data-theme="light"] .tbl-wrap {
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
    }

    /* ═══════ DETAIL DRAWER ═══════ */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
      transition: background .3s ease;
    }

    .drawer-backdrop.open {
      background: rgba(0, 0, 0, .55);
      pointer-events: auto;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      z-index: 201;
      width: 480px;
      max-width: 100vw;
      background: var(--card);
      border-left: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.16, 1, .3, 1);
      box-shadow: -24px 0 72px rgba(0, 0, 0, .45);
      overflow: hidden;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      padding: 22px 26px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .drawer-head::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 212, 160, .04) 0%, transparent 60%);
      pointer-events: none;
    }

    .drawer-head-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), rgba(0, 212, 160, .1));
    }

    .drawer-title-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .drawer-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .32em;
      color: var(--cyan);
      text-transform: uppercase;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-label::before {
      content: '';
      width: 16px;
      height: 1px;
      background: var(--cyan);
    }

    .drawer-head h2 {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--text);
      line-height: 1.1;
    }

    .drawer-device-id {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: .06em;
      margin-top: 2px;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-close {
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--line);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .drawer-close:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .09);
      border-color: var(--line2);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 26px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* sections */
    .dsec {
      background: var(--deep);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .dsec-head {
      padding: 11px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 9px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    .dsec-head-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dsec-head-icon svg {
      width: 11px;
      height: 11px;
    }

    .dsec-cyan .dsec-head-icon {
      background: rgba(0, 212, 160, .12);
      color: var(--cyan);
    }

    .dsec-blue .dsec-head-icon {
      background: rgba(91, 156, 246, .12);
      color: var(--blue);
    }

    .dsec-yellow .dsec-head-icon {
      background: rgba(255, 176, 32, .12);
      color: var(--yellow);
    }

    .dsec-purple .dsec-head-icon {
      background: rgba(167, 139, 250, .12);
      color: var(--purple);
    }

    .dsec-body {
      padding: 14px 16px;
    }

    /* identity row */
    .d-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }

    .d-field:last-child {
      margin-bottom: 0;
    }

    .d-field-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted2);
      font-weight: 400;
    }

    .d-field-val {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card3);
      border: 1px solid var(--line);
      border-radius: var(--radius-xs);
      padding: 9px 12px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      min-height: 38px;
    }

    .d-val-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: .04em;
    }

    .d-val-text.masked {
      letter-spacing: .12em;
      font-size: 16px;
      color: var(--muted);
    }

    .d-copy-btn,
    .d-eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      color: var(--muted2);
      transition: all .15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .d-copy-btn:hover,
    .d-eye-btn:hover {
      color: var(--cyan);
      background: var(--cyan-dim);
    }

    .d-copy-btn svg,
    .d-eye-btn svg {
      width: 13px;
      height: 13px;
    }

    /* permissions grid */
    .perm-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .perm-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 11px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--line);
      background: var(--card3);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .06em;
      transition: border-color .15s, background .15s;
    }

    .perm-item.on {
      border-color: rgba(0, 212, 160, .22);
      background: rgba(0, 212, 160, .05);
      color: var(--text);
    }

    .perm-item.off {
      color: var(--muted2);
    }

    .perm-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .perm-item.on .perm-dot {
      background: var(--cyan);
      box-shadow: 0 0 6px rgba(0, 212, 160, .6);
    }

    .perm-item.off .perm-dot {
      background: var(--line2);
    }

    .perm-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: .5;
    }

    .perm-item.on .perm-icon {
      opacity: 1;
      color: var(--cyan);
    }

    /* info grid */
    .info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 20px;
      align-items: center;
    }

    .info-key {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted2);
      letter-spacing: .1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .info-val {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      letter-spacing: .04em;
    }

    .info-val .badge {
      font-size: 11px;
      padding: 3px 8px;
    }

    /* drawer sessions */
    .dsession-item {
      background: var(--card3);
      border: 1px solid var(--line);
      border-radius: var(--radius-xs);
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .dsession-item:last-child {
      margin-bottom: 0;
    }

    .dsi-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .dsi-id {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .dsi-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .dsi-grid span:nth-child(even) {
      color: var(--text);
    }

    .no-sessions {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted2);
      letter-spacing: .08em;
      text-align: center;
      padding: 16px 0;
    }

    /* row click cursor */
    tbody tr {
      cursor: pointer;
    }

    tbody tr td.acts-cell,
    tbody tr td.cb-cell {
      cursor: default;
    }

    /* ── RESPONSIVE ── */
    @media (max-width:960px) {
      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .body {
        padding: 24px 20px 48px;
      }

      .topbar {
        padding: 0 20px;
      }

      .t-brand sub,
      .live-pill,
      .t-divider {
        display: none;
      }

      .search-input {
        width: 180px;
      }

      th:nth-child(3),
      td:nth-child(3),
      th:nth-child(5),
      td:nth-child(5) {
        display: none;
      }
    }

    @media (max-width:640px) {
      .login-left {
        display: none;
      }

      .login-right {
        padding: 48px 32px;
      }

      .filter-tabs {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>

  <!-- ═══ MAIN ═══ -->
  <div id="main-page">
    <header class="topbar">
      <div class="t-left">
        <div class="t-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#050507" stroke-width="2.5" stroke-linecap="round">

    <div class="body">

      <div class="stats">

          <div class="sc-header">

          <div class="sc-accent"></div>
          <div class="sc-glow"></div>
          <div class="sc-header">
            <div class="sc-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 8v4l2 2" />

            </div>
            <div class="sc-label">远控中</div>

          <div class="sc-divider"></div>

        <div class="sc sc-ok">

          <div class="sc-glow"></div>
          <div class="sc-header">

      <!-- Batch Bar -->

        <div class="batch-actions">
          <button class="bbtn bb-ban" onclick="batchBan()">批量禁用</button>
          <button class="bbtn bb-unban" onclick="batchUnban()">批量恢复</button>
          <button class="bbtn bb-del" onclick="batchDel()">批量删除</button>

      <div class="tbl-wrap">

  <!-- ═══ DEVICE DETAIL DRAWER ═══ -->
  <div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>

  <!-- ═══ MODAL ═══ -->
  <div class="modal-backdrop" id="modal" onclick="closeModal(event)">

            </svg>
          </div>

          </div>
        </div>

  <div id="toast">
    <div class="tbar"></div><span id="tmsg"></span>
  </div>

  <script>
    // ── 配置 ──
    const LATEST_VERSION = '1.4.5';

    // ── 主题 ──
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-btn').textContent = next === 'light' ? '☀️' : '🌙';
    }
    (function () {
      const saved = localStorage.getItem('theme') || 'dark';
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
      window.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('theme-btn');
        if (btn) btn.textContent = saved === 'light' ? '☀️' : '🌙';
      });
    })();

    // ── 状态 ──
    let token = sessionStorage.getItem('tk') || '';
    let devices = [];
    let timer = null;
    let curFilter = 'all';
    let selected = new Set();

    // ── 选择管理 ──
    function toggleAll(cb) {
      const rows = document.querySelectorAll('#tbody .row-cb');
      rows.forEach(rowCb => {
        rowCb.checked = cb.checked;
        const tr = rowCb.closest('tr');
        const id = rowCb.dataset.id;
        if (cb.checked) { selected.add(id); tr.classList.add('selected'); }
        else { selected.delete(id); tr.classList.remove('selected'); }
      });
      updateBatchBar();
    }

    function toggleRow(cb) {
      const id = cb.dataset.id;
      const tr = cb.closest('tr');
      if (cb.checked) { selected.add(id); tr.classList.add('selected'); }
      else { selected.delete(id); tr.classList.remove('selected'); }
      syncHeaderCb();
      updateBatchBar();
    }

    function syncHeaderCb() {
      const allCbs = document.querySelectorAll('#tbody .row-cb');
      const checkedCount = document.querySelectorAll('#tbody .row-cb:checked').length;
      const headerCb = document.getElementById('cb-all');
      if (!headerCb) return;
      if (checkedCount === 0) { headerCb.checked = false; headerCb.indeterminate = false; }
      else if (checkedCount === allCbs.length) { headerCb.checked = true; headerCb.indeterminate = false; }
      else { headerCb.checked = false; headerCb.indeterminate = true; }
    }

    function updateBatchBar() {
      const bar = document.getElementById('batch-bar');
      const cnt = document.getElementById('batch-count');
      const tbl = document.querySelector('.tbl-wrap');
      if (!bar) return;
      if (selected.size > 0) {
        bar.classList.add('visible');
        cnt.textContent = `已选 ${selected.size} 台设备`;
        tbl && tbl.classList.add('has-selection');
      } else {
        bar.classList.remove('visible');
        tbl && tbl.classList.remove('has-selection');
      }
    }

    function clearSelection() {
      selected.clear();
      document.querySelectorAll('#tbody .row-cb').forEach(cb => { cb.checked = false; cb.closest('tr').classList.remove('selected'); });
      const hCb = document.getElementById('cb-all');
      if (hCb) { hCb.checked = false; hCb.indeterminate = false; }
      updateBatchBar();
    }

    // ── 批量操作 ──
    async function batchBan() {
      const ids = [...selected];
      if (!ids.length) return;
      if (!confirm(`确认禁用选中的 ${ids.length} 台设备的远程功能？\n\n⚠️ 此操作将立即断开这些设备的所有远程连接。`)) return;
      await Promise.all(ids.map(id => fetch(`/admin/devices/${encodeURIComponent(id)}/ban`, { method: 'POST', headers: { 'x-admin-token': token } })));
      toast(`已禁用 ${ids.length} 台设备，远程连接已断开`, 'danger');
      clearSelection(); load();
    }

    async function batchUnban() {
      const ids = [...selected];
      if (!ids.length) return;
      await Promise.all(ids.map(id => fetch(`/admin/devices/${encodeURIComponent(id)}/unban`, { method: 'POST', headers: { 'x-admin-token': token } })));
      toast(`已恢复 ${ids.length} 台设备`, 'success');
      clearSelection(); load();
    }

    async function batchDel() {
      const ids = [...selected];
      if (!ids.length) return;
      if (!confirm(`确认删除选中的 ${ids.length} 条设备记录？此操作不可撤销。`)) return;
      await Promise.all(ids.map(id => fetch(`/admin/devices/${encodeURIComponent(id)}`, { method: 'DELETE', headers: { 'x-admin-token': token } })));
      toast(`已删除 ${ids.length} 条记录`, 'info');
      clearSelection(); load();
    }

    // ── 登录 ──
    async function login() {
      const pw = document.getElementById('pw').value;
      const err = document.getElementById('lerr');
      err.textContent = '';
      try {
        const r = await fetch('/admin/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const d = await r.json();
        if (d.code === 200) {
          token = d.token;
          sessionStorage.setItem('tk', token);
          showMain();
        } else {
          err.textContent = '密码错误，请重试';
          shake();
        }
      } catch { err.textContent = '无法连接到服务器'; }
    }

    function shake() {
      document.querySelector('.login-form-wrap').animate([
        { transform: 'translateX(0)' }, { transform: 'translateX(-8px)' }, { transform: 'translateX(8px)' },
        { transform: 'translateX(-4px)' }, { transform: 'translateX(4px)' }, { transform: 'translateX(0)' }
      ], { duration: 360, easing: 'ease' });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
      if (token) showMain();
    });

    function logout() {
      token = ''; sessionStorage.removeItem('tk'); clearInterval(timer);
      document.getElementById('main-page').style.display = 'none';
      document.getElementById('login-page').style.display = 'flex';
    }

    function showMain() {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('main-page').style.display = 'block';
      load(); clearInterval(timer); timer = setInterval(load, 15000);
    }

    // ── 数据加载 ──
    async function load() {
      try {
        const r = await fetch('/admin/devices', { headers: { 'x-admin-token': token } });
        if (r.status === 401) { logout(); return; }
        const d = await r.json();
        devices = d.data || [];
        updateStats(); render(); refreshDrawerIfOpen();
      } catch { toast('数据加载失败', 'danger'); }
    }

    // ── 统计 ──
    function updateStats() {
      const banned = devices.filter(d => d.banned).length;
      const remoting = devices.filter(d => d.remoting).length;
      const normal = devices.filter(d => !d.banned).length;
      countUp('s-total', devices.length);
      countUp('s-remote', remoting);
      countUp('s-normal', normal);
      countUp('s-banned', banned);
    }

    function countUp(id, target) {
      const el = document.getElementById(id);
      const from = parseInt(el.textContent) || 0;
      if (from === target) { el.textContent = target; return; }
      let v = from, step = target > from ? 1 : -1;
      const t = setInterval(() => { v += step; el.textContent = v; if (v === target) clearInterval(t); }, 28);
    }

    // ── 过滤 ──
    function setFilter(f, btn) {
      curFilter = f;
      document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function isOutdated(v) {
      if (!v) return false;
      return v !== LATEST_VERSION;
    }

    // ── 渲染 ──
    function render() {
      const kw = document.getElementById('search').value.toLowerCase();
      let list = devices.filter(d => {
        const match = d.id.toLowerCase().includes(kw) ||
          (d.ip || '').toLowerCase().includes(kw) ||
          (d.appVersion || '').toLowerCase().includes(kw);
        if (!match) return false;
        if (curFilter === 'remoting') return d.remoting;
        if (curFilter === 'normal') return !d.banned;
        if (curFilter === 'banned') return d.banned;
        if (curFilter === 'outdated') return isOutdated(d.appVersion);
        return true;
      });

      const tbody = document.getElementById('tbody');
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="9" class="placeholder">暂无设备记录</td></tr>`;
        return;
      }

      tbody.innerHTML = list.map((d, i) => {
        let vBadge;
        if (!d.appVersion) {
          vBadge = `<span class="version-tag v-unknown">未知</span>`;
        } else if (isOutdated(d.appVersion)) {
          vBadge = `<span class="version-tag v-outdated">v${h(d.appVersion)} ↑</span>`;
        } else {
          vBadge = `<span class="version-tag v-ok">v${h(d.appVersion)}</span>`;
        }

        const remoteBadge = d.remoting
          ? `<span class="badge b-remote"><span class="bdot"></span>远控中</span>`
          : `<span class="badge b-idle"><span class="bdot"></span>空闲</span>`;

        const activePeer = d.activeSessions?.length
          ? `<div style="font-family:var(--mono);font-size:13px;color:var(--text);margin-top:5px">
           操控方: ${h(d.activeSessions[0].peerId || '—')}
         </div>`
          : '';

        const histCount = (d.sessions || []).length;
        const isSelected = selected.has(d.id);

        return `
    <tr class="${isSelected ? 'selected' : ''}" style="animation:riseUp .3s cubic-bezier(.16,1,.3,1) ${i * .025}s both" onclick="openDrawer('${a(d.id)}')">
      <td class="cb-cell" onclick="event.stopPropagation()"><input type="checkbox" class="row-cb" data-id="${h(d.id)}" ${isSelected ? 'checked' : ''} onchange="toggleRow(this)"></td>
      <td><div class="dev-id" title="${h(d.id)}">${h(d.id)}</div></td>
      <td><div class="dev-ip">${h(d.ip || '—')}</div></td>
      <td>${vBadge}</td>
      <td>
        ${remoteBadge}
        ${activePeer}
      </td>
      <td><div class="time">${fmt(d.firstSeen)}</div></td>
      <td><div class="time">${fmt(d.lastSeen)}</div></td>
      <td>
        <span class="badge ${d.banned ? 'b-ban' : 'b-ok'}">
          <span class="bdot"></span>${d.banned ? '已禁用' : '正常'}
        </span>
      </td>
      <td class="acts-cell" onclick="event.stopPropagation()">
        <div class="acts">
          ${d.banned
            ? `<button class="abtn a-unban" onclick="unban('${a(d.id)}')">恢复</button>`
            : `<button class="abtn a-ban"   onclick="ban('${a(d.id)}')">禁用</button>`
          }
          ${histCount ? `<button class="abtn a-hist" onclick="showHistory('${a(d.id)}')">历史(${histCount})</button>` : ''}
          <button class="abtn a-del" onclick="del('${a(d.id)}')">删除</button>
        </div>
      </td>
    </tr>`;
      }).join('');

      syncHeaderCb();
      updateBatchBar();
    }

    // ── 操作 ──
    async function ban(id) {
      if (!confirm(`确认禁用该设备的远程功能？\n\n设备 ID: ${id}\n\n⚠️ 此操作将立即断开该设备的所有远程连接。`)) return;
      const r = await fetch(`/admin/devices/${encodeURIComponent(id)}/ban`, { method: 'POST', headers: { 'x-admin-token': token } });
      const d = await r.json();
      if (d.code === 200) { toast('设备已禁用，远程连接已断开', 'danger'); load(); }
    }

    async function unban(id) {
      const r = await fetch(`/admin/devices/${encodeURIComponent(id)}/unban`, { method: 'POST', headers: { 'x-admin-token': token } });
      const d = await r.json();
      if (d.code === 200) { toast('设备已恢复', 'success'); load(); }
    }

    async function del(id) {
      if (!confirm(`确认删除该设备记录？\n\n${id}`)) return;
      const r = await fetch(`/admin/devices/${encodeURIComponent(id)}`, { method: 'DELETE', headers: { 'x-admin-token': token } });
      const d = await r.json();
      if (d.code === 200) { toast('记录已删除', 'info'); load(); }
    }

    // ── 会话历史 ──
    function showHistory(id) {
      const device = devices.find(d => d.id === id);
      if (!device) return;

      document.getElementById('modal-device-id').textContent = id;
      const sessions = (device.sessions || []).slice().reverse();

      const body = document.getElementById('modal-body');
      if (!sessions.length) {
        body.innerHTML = `<div class="modal-empty">暂无会话记录</div>`;
      } else {
        body.innerHTML = sessions.map(s => {
          const active = !s.ended && (Date.now() - new Date(s.lastHeartbeat || s.startTime).getTime() < 90000);
          const badge = active
            ? `<span class="badge b-remote"><span class="bdot"></span>进行中</span>`
            : `<span class="badge b-idle"><span class="bdot"></span>已结束</span>`;
          const duration = s.endTime
            ? fmtDuration(new Date(s.endTime) - new Date(s.startTime))
            : active ? fmtDuration(Date.now() - new Date(s.startTime).getTime()) + ' (进行中)' : '—';
          return `
      <div class="session-item">
        <div class="si-top">
          ${badge}
          <span class="si-id"># ${h(s.sessionId)}</span>
        </div>
        <div class="si-detail">
          <span style="color:var(--text)">操控方</span><span>${h(s.peerId || '—')}</span>
          <span style="color:var(--text)">开始时间</span><span>${fmt(s.startTime)}</span>
          <span style="color:var(--text)">结束时间</span><span>${s.endTime ? fmt(s.endTime) : '—'}</span>
          <span style="color:var(--text)">持续时长</span><span>${duration}</span>
        </div>
      </div>`;
        }).join('');
      }

      document.getElementById('modal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modal').classList.remove('open');
    }

    // ── 设备详情抽屉 ──
    let drawerDeviceId = null;

    function openDrawer(id) {
      const device = devices.find(d => d.id === id);
      if (!device) return;
      drawerDeviceId = id;
      renderDrawer(device);
      document.getElementById('device-drawer').classList.add('open');
      document.getElementById('drawer-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      document.getElementById('device-drawer').classList.remove('open');
      document.getElementById('drawer-backdrop').classList.remove('open');
      document.body.style.overflow = '';
      drawerDeviceId = null;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    function renderDrawer(d) {
      // Title
      const remoteBadge = d.remoting
        ? `<span class="badge b-remote" style="font-size:11px;padding:3px 9px"><span class="bdot"></span>远控中</span>`
        : `<span class="badge b-idle" style="font-size:11px;padding:3px 9px"><span class="bdot"></span>空闲</span>`;

      document.getElementById('drawer-title').innerHTML = `${h(d.id)} ${remoteBadge}`;
      document.getElementById('drawer-subtitle').textContent = d.ip ? `IP: ${d.ip}` : '—';

      // Permissions
      const perms = d.permissions || {};
      const permList = [
        { key: 'keyboard', label: '键盘控制', icon: '<path d="M9 6h.01M12 6h.01M15 6h.01M6 10h.01M9 10h.01M12 10h.01M15 10h.01M18 10h.01M6 14h12"/><rect x="2" y="4" width="20" height="16" rx="2"/>' },
        { key: 'clipboard', label: '剪贴板', icon: '<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>' },
        { key: 'audio', label: '音频', icon: '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>' },
        { key: 'file_transfer', label: '文件传输', icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/>' },
        { key: 'restart', label: '重启控制', icon: '<path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>' },
        { key: 'recording', label: '录屏', icon: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>' },
      ];

      const permHTML = permList.map(p => {
        const on = perms[p.key] === true || perms[p.key] === 'true' || perms[p.key] === 1;
        return `<div class="perm-item ${on ? 'on' : 'off'}">
      <span class="perm-dot"></span>
      <svg class="perm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p.icon}</svg>
      ${p.label}
    </div>`;
      }).join('');

      // Version badge
      let vBadge;
      if (!d.appVersion) vBadge = `<span class="version-tag v-unknown">未知</span>`;
      else if (isOutdated(d.appVersion)) vBadge = `<span class="version-tag v-outdated">v${h(d.appVersion)} ↑</span>`;
      else vBadge = `<span class="version-tag v-ok">v${h(d.appVersion)}</span>`;

      // Sessions
      const recentSessions = (d.sessions || []).slice().reverse().slice(0, 5);
      const sessHTML = recentSessions.length ? recentSessions.map(s => {
        const active = !s.ended && (Date.now() - new Date(s.lastHeartbeat || s.startTime).getTime() < 90000);
        const sb = active
          ? `<span class="badge b-remote" style="font-size:10px;padding:2px 7px"><span class="bdot"></span>进行中</span>`
          : `<span class="badge b-idle" style="font-size:10px;padding:2px 7px"><span class="bdot"></span>已结束</span>`;
        const dur = s.endTime
          ? fmtDuration(new Date(s.endTime) - new Date(s.startTime))
          : active ? fmtDuration(Date.now() - new Date(s.startTime).getTime()) + ' (进行中)' : '—';
        return `<div class="dsession-item">
      <div class="dsi-top">${sb}<span class="dsi-id"># ${h(s.sessionId)}</span></div>
      <div class="dsi-grid">
        <span>操控方</span><span>${h(s.peerId || '—')}</span>
        <span>开始</span><span>${fmt(s.startTime)}</span>
        <span>时长</span><span>${dur}</span>
      </div>
    </div>`;
      }).join('') : `<div class="no-sessions">暂无会话记录</div>`;

      const pw = d.password;
      const pwDisplay = pw || '—';
      const pwMasked = pw ? '●'.repeat(Math.min(pw.length, 8)) : '—';

      document.getElementById('drawer-body').innerHTML = `
    <!-- 身份信息 -->
    <div class="dsec dsec-cyan">
      <div class="dsec-head">
        <div class="dsec-head-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        身份凭据
      </div>
      <div class="dsec-body">
        <div class="d-field">
          <div class="d-field-label">设备 ID</div>
          <div class="d-field-val">
            <span class="d-val-text" id="dv-id">${h(d.id)}</span>
            <button class="d-copy-btn" onclick="copyVal('${a(d.id)}', this)" title="复制">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <div class="d-field">
          <div class="d-field-label">访问密码</div>
          <div class="d-field-val">
            <span class="d-val-text masked" id="dv-pw">${h(pwMasked)}</span>
            ${pw ? `
            <button class="d-eye-btn" id="pw-eye-btn" onclick="togglePwVis('${a(pwDisplay)}')" title="显示/隐藏">
              <svg id="pw-eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="d-copy-btn" onclick="copyVal('${a(pwDisplay)}', this)" title="复制">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>` : ''}
          </div>
        </div>
      </div>
    </div>

    <!-- 权限 -->
    <div class="dsec dsec-purple">
      <div class="dsec-head">
        <div class="dsec-head-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        开放权限
      </div>
      <div class="dsec-body">
        <div class="perm-grid">${permHTML}</div>
      </div>
    </div>

    <!-- 基础信息 -->
    <div class="dsec dsec-blue">
      <div class="dsec-head">
        <div class="dsec-head-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </div>
        设备信息
      </div>
      <div class="dsec-body">
        <div class="info-grid">
          <span class="info-key">IP 地址</span>
          <span class="info-val">${h(d.ip || '—')}</span>
          <span class="info-key">软件版本</span>
          <span class="info-val">${vBadge}</span>
          <span class="info-key">设备状态</span>
          <span class="info-val"><span class="badge ${d.banned ? 'b-ban' : 'b-ok'}"><span class="bdot"></span>${d.banned ? '已禁用' : '正常'}</span></span>
          <span class="info-key">远控状态</span>
          <span class="info-val">${d.remoting ? '<span class="badge b-remote"><span class="bdot"></span>远控中</span>' : '<span class="badge b-idle"><span class="bdot"></span>空闲</span>'}</span>
          <span class="info-key">首次接入</span>
          <span class="info-val">${fmt(d.firstSeen)}</span>
          <span class="info-key">最近上线</span>
          <span class="info-val">${fmt(d.lastSeen)}</span>
          ${d.activeSessions?.length ? `<span class="info-key">操控方</span><span class="info-val">${h(d.activeSessions[0].peerId || '—')}</span>` : ''}
        </div>
      </div>
    </div>

    <!-- 会话记录 -->
    <div class="dsec dsec-yellow">
      <div class="dsec-head">
        <div class="dsec-head-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
        </div>
        最近会话 ${recentSessions.length ? `(${recentSessions.length})` : ''}
      </div>
      <div class="dsec-body">${sessHTML}</div>
    </div>
  `;
    }

    // re-render drawer if open (called after data reload)
    function refreshDrawerIfOpen() {
      if (!drawerDeviceId) return;
      const device = devices.find(d => d.id === drawerDeviceId);
      if (device) renderDrawer(device);
    }

    let _pwVisible = false;
    function togglePwVis(pw) {
      _pwVisible = !_pwVisible;
      const el = document.getElementById('dv-pw');
      if (!el) return;
      if (_pwVisible) {
        el.textContent = pw;
        el.classList.remove('masked');
      } else {
        el.textContent = '●'.repeat(Math.min(pw.length, 8));
        el.classList.add('masked');
      }
    }

    function copyVal(val, btn) {
      navigator.clipboard.writeText(val).then(() => {
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        setTimeout(() => { btn.innerHTML = orig; }, 1400);
      }).catch(() => toast('复制失败', 'danger'));
    }

    function fmt(iso) {
      if (!iso) return '—';
      const d = new Date(iso), p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    function fmtDuration(ms) {
      if (ms < 0) ms = 0;
      const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
      if (h > 0) return `${h}小时 ${m % 60}分`;
      if (m > 0) return `${m}分 ${s % 60}秒`;
      return `${s}秒`;
    }

    function h(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function a(s) { return String(s).replace(/'/g, "\\'"); }

    let tt;
    function toast(msg, type = 'info') {
      const el = document.getElementById('toast');
      document.getElementById('tmsg').textContent = msg;
      el.className = `show ${type}`;
      clearTimeout(tt); tt = setTimeout(() => el.className = '', 3000);
    }
  </script>
</body>

</html>
