services:
  hbbs:
    container_name: hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r 112.74.59.152:21117 -k _
    volumes:
      - ./data:/root
    network_mode: "host"
    restart: always

  hbbr:
    container_name: hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr -k _
    volumes:
      - ./data:/root
    network_mode: "host"
    restart: always

  version-check:
    container_name: version-check
    image: node:20
    working_dir: /app
    user: "0:0"
    environment:
      ADMIN_PASSWORD: "jiaying"
    volumes:
      - ./version-check:/app   # index.js 和 package.json 放在这个目录
      - ./version-check/apk:/app/apk   # APK 文件持久化存储
      - /app/node_modules
    command: sh -c "umask 022 && npm install && node index.js"
    network_mode: "host"       # 与上面保持一致，直接用 :3000 端口
    restart: always

  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro   # Nginx 配置
      - ./ssl:/etc/nginx/ssl:ro                          # SSL 证书目录
    network_mode: "host"       # 与上面保持一致
    depends_on:
      - version-check
    restart: always