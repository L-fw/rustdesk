version: '3'
services:
  hbbs:
    container_name: hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r 112.74.59.152:21117 -k _
    volumes:
      - ./data:/root
    network_mode: "host"
    restart: always

  hbbr:
    container_name: hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr -k _
    volumes:
      - ./data:/root
    network_mode: "host"
    restart: always

  version-check:
    container_name: version-check
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./version-check:/app   # index.js 和 package.json 放在这个目录
    command: sh -c "npm install && node index.js"
    network_mode: "host"       # 与上面保持一致，直接用 :3000 端口
    restart: always
