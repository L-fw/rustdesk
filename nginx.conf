# ═══════════════════════════════════════════════════════
# RustDesk 设备管理后台 - Nginx 反向代理 + SSL
# ═══════════════════════════════════════════════════════

# HTTP → HTTPS 自动跳转
server {
    listen 80;
    server_name jyyxt.cloud;   # ← 正式域名到位后替换

    # 所有 HTTP 请求 301 跳转到 HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl;
    server_name jyyxt.cloud;   # ← 正式域名到位后替换

    # ── SSL 证书 ──────────────────────────────────
    # 先使用自签名证书，正式证书到位后替换这两个文件即可
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # ── SSL 安全参数 ──────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── APK 上传大小限制（与 multer 保持一致：200MB）──
    client_max_body_size 200m;

    # ── WebSocket 代理（/ws 路径）──────────────────
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接超时（默认 60s 太短）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── 反向代理到 Node.js（所有其他路径）──────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}